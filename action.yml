name: VibeGuard
description: Local-first AI application security scanner with AI BOM and agent capability graph outputs.
author: VibeGuard maintainers

branding:
  icon: shield
  color: blue

inputs:
  path:
    description: Repository path to scan.
    required: false
    default: "."
  fail-on-findings:
    description: Fail the action when VibeGuard returns blocking findings.
    required: false
    default: "false"

outputs:
  sarif-file:
    description: Path to the generated SARIF report.
    value: vibeguard.sarif
  aibom-file:
    description: Path to the generated AI BOM report.
    value: vibeguard-aibom.json
  agent-graph-file:
    description: Path to the generated agent graph report.
    value: vibeguard-agent-graph.json
  exit-code:
    description: VibeGuard scan exit code. 0 means no blocking findings, 1 means blocking findings, 2 means runtime or configuration error.
    value: ${{ steps.scan.outputs.status }}

runs:
  using: composite
  steps:
    - name: Generate AI BOM
      shell: bash
      run: node "$GITHUB_ACTION_PATH/packages/cli/src/index.ts" aibom "${{ inputs.path }}" --format aibom-json --output vibeguard-aibom.json
    - name: Generate Agent Graph
      shell: bash
      run: node "$GITHUB_ACTION_PATH/packages/cli/src/index.ts" graph "${{ inputs.path }}" --format graph-json --output vibeguard-agent-graph.json
    - name: Run VibeGuard SARIF scan
      id: scan
      shell: bash
      run: |
        set +e
        node "$GITHUB_ACTION_PATH/packages/cli/src/index.ts" check "${{ inputs.path }}" --format sarif --output vibeguard.sarif
        status=$?
        echo "status=$status" >> "$GITHUB_OUTPUT"

        if [ "$status" -eq 1 ] && [ "${{ inputs.fail-on-findings }}" != "true" ]; then
          exit 0
        fi

        exit "$status"
