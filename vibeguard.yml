mode: block
enabledScanners:
  - code
  - secrets
  - dependencies
  - docker
  - actions
  - sensitive-files
  - ai
blockSeverities:
  - high
  - critical
include:
  - "**/*"
exclude:
  - ".git/**"
  - "dist/**"
  - "node_modules/**"
  - "coverage/**"
  - "reports/**"
  - "vibeguard-report.*"
  - "tests/**"
  - "docs/superpowers/**"
  - "benchmarks/**"
dependencyPolicy:
  vulnerable: block
  broadVersionRange: warn
secretPolicy:
  block: true
sensitiveFilePolicy:
  block: true
suppressionPolicy:
  requireReason: true
  requireReviewer: true
  requireExpiration: true
aiPrompts:
  enabled: true
suppressions: []
minConfidence: high
