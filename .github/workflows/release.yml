name: Local Release Verification

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  verify-local-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          package-manager-cache: false
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm pack --dry-run
      - run: npm run vibeguard:dist -- doctor
