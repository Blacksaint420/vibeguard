name: Main Change Readiness

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "action.yml"
      - "benchmarks/**"
      - "docs/**"
      - "examples/**"
      - "package.json"
      - "package-lock.json"
      - "packages/**"
      - "schemas/**"
      - "scripts/**"
      - "tests/**"
      - "vibeguard.yml"
      - "vibeguard.yml.example"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "README.md"
      - "SECURITY.md"
      - "SUPPORT.md"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: main-change-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  readiness:
    name: Verify significant main change
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm pack --dry-run
      - name: Generate AI BOM
        run: node dist/packages/cli/src/index.js aibom --format aibom-json --output vibeguard-aibom.json
      - name: Generate Agent Graph
        run: node dist/packages/cli/src/index.js graph --format graph-json --output vibeguard-agent-graph.json
      - name: Run VibeGuard SARIF scan
        id: vibeguard
        shell: bash
        run: |
          set +e
          node dist/packages/cli/src/index.js check --format sarif --output vibeguard.sarif
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: vibeguard.sarif
          category: vibeguard-main-change
      - uses: actions/upload-artifact@v4
        with:
          name: vibeguard-main-change-reports
          path: |
            vibeguard.sarif
            vibeguard-aibom.json
            vibeguard-agent-graph.json
      - name: Fail on blocking findings
        if: steps.vibeguard.outputs.status == '1'
        run: exit 1
      - name: Fail on runtime or configuration errors
        if: steps.vibeguard.outputs.status == '2'
        run: exit 2
